<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle">Switch Theme</button>
        <h1>Lotto Number Generator</h1>
        <div class="generator">
            <button id="generate-btn">Generate Numbers</button>
            <div id="result" class="result"></div>
        </div>

        <div class="contact-form">
            <h2>Partnership Inquiry</h2>
            <form action="https://formspree.io/f/mjgzbanw" method="POST">
                <div class="form-group">
                    <label for="email">Email address:</label>
                    <input type="email" id="email" name="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" required placeholder="Enter your inquiry here..."></textarea>
                </div>
                <button type="submit" id="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
